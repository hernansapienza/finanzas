<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Finanzas Personales</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#141720;--surface2:#181d28;
  --border:#252a35;--border-light:#2e3547;
  --gold:#c9a84c;--gold-dim:#8a7035;
  --green:#4ade80;--green-dim:#166534;
  --blue:#60a5fa;--text:#e8eaf0;--muted:#6b7280;--red:#f87171;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;
  background-image:radial-gradient(ellipse at 15% 15%,rgba(201,168,76,.05) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 85%,rgba(96,165,250,.04) 0%,transparent 55%)}
.page{max-width:520px;margin:0 auto;padding:1.5rem 1rem 3rem;display:flex;flex-direction:column;gap:1.25rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem 1.5rem;
  box-shadow:0 0 0 1px rgba(255,255,255,.03),0 20px 48px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.05)}
.header{text-align:center;margin-bottom:1.5rem}
.emojis{font-size:1.7rem;display:block;margin-bottom:.5rem;letter-spacing:.08em}
.title{font-family:'Playfair Display',serif;color:var(--gold);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase}
.slabel{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;gap:.75rem}
.lbl{font-size:.82rem;color:var(--muted);min-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iw{display:flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:8px;padding:.4rem .65rem;transition:border-color .2s,box-shadow .2s;flex:1;max-width:170px}
.iw:focus-within{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(201,168,76,.08)}
.cur{color:var(--gold);font-size:.78rem;font-weight:500;user-select:none}
input[type=number]{background:transparent;border:none;outline:none;color:var(--text);
  font-family:'DM Mono',monospace;font-size:.88rem;width:100%;text-align:right;-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
hr.div{border:none;border-top:1px solid var(--border);margin:.75rem 0}
hr.thick{border-top-color:var(--border-light)}
.tbox{border-radius:8px;padding:.7rem .9rem;margin:.4rem 0;display:flex;align-items:center;
  justify-content:space-between;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.18)}
.tlbl{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase}
.tval{font-size:1.05rem;font-weight:500;color:var(--gold)}
.brow{display:flex;gap:.6rem;margin-top:1.1rem}
.btn{flex:1;padding:.75rem .5rem;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none !important}
.btn-s{background:linear-gradient(135deg,var(--gold-dim),#6b5422);border:1px solid var(--gold-dim);color:#f5e6c0}
.btn-s:hover:not(:disabled){background:linear-gradient(135deg,#a07a30,#8a6424);transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(201,168,76,.15)}
.btn-s.ok{background:linear-gradient(135deg,var(--green-dim),#14532d);border-color:var(--green-dim);color:var(--green)}
.btn-c{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--blue)}
.btn-c:hover:not(:disabled){background:rgba(96,165,250,.15);transform:translateY(-1px)}
.btn-i{background:rgba(255,255,255,.04);border:1px solid var(--border-light);color:var(--muted)}
.btn-i:hover:not(:disabled){background:rgba(255,255,255,.07);color:var(--text);transform:translateY(-1px)}
.smsg{font-size:.68rem;color:var(--muted);text-align:center;margin-top:.5rem;min-height:1.2em}
.smsg.err{color:var(--red)}
.status-bar{display:flex;align-items:center;gap:.5rem;font-size:.62rem;color:var(--muted);
  padding:.5rem .75rem;background:rgba(255,255,255,.03);border-radius:8px;margin-top:.75rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.ok{background:var(--green)}
.dot.err{background:var(--red)}
.dot.loading{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;
  box-shadow:0 0 0 1px rgba(255,255,255,.03),0 12px 32px rgba(0,0,0,.4)}
.ch{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.4rem}
.ct{font-family:'Playfair Display',serif;color:var(--gold);font-size:.9rem}
.cs{font-size:.62rem;color:var(--muted)}
.leg{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:.35rem;font-size:.65rem;color:var(--muted)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cw{position:relative;height:220px}
.tcrd{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.03)}
.th{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)}
.tt{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.tw{overflow-x:auto;max-height:260px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.74rem}
thead th{position:sticky;top:0;background:var(--surface2);padding:.55rem .65rem;text-align:left;
  font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:.5rem .65rem;white-space:nowrap}
tbody td:not(:first-child){text-align:right}
.dt{color:var(--muted)}
.dtt{color:var(--gold);font-weight:500}
.xb{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.72rem;
  padding:.1rem .3rem;border-radius:4px;transition:color .15s,background .15s}
.xb:hover{color:var(--red);background:rgba(248,113,113,.1)}
.es{padding:2rem;text-align:center;color:var(--muted);font-size:.76rem;line-height:1.9}
#fi{display:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:4px}
</style>
</head>
<body>
<div class="page">

<div class="card">
  <div class="header">
    <span class="emojis">&#x1F4B5; &#x1F4B8; &#x1F911; &#x1F3E6;</span>
    <div class="title">Resumen Financiero</div>
  </div>
  <div class="slabel">Activos</div>
  <div class="row">
    <span class="lbl">Caja de Seguridad</span>
    <div class="iw"><span class="cur">$</span><input type="number" id="caja" placeholder="0.00" step="0.01" min="0"></div>
  </div>
  <div class="row">
    <span class="lbl">Balanz</span>
    <div class="iw"><span class="cur">$</span><input type="number" id="balanz" placeholder="0.00" step="0.01" min="0"></div>
  </div>
  <div class="row">
    <span class="lbl">FCI Banco Galicia</span>
    <div class="iw"><span class="cur">$</span><input type="number" id="fci" placeholder="0.00" step="0.01" min="0"></div>
  </div>
  <hr class="div thick">
  <div class="tbox">
    <span class="tlbl">Total</span>
    <span class="tval" id="total">$ 0.00</span>
  </div>
  <div class="brow">
    <button class="btn btn-s" id="saveBtn" onclick="saveRecord()">&#x1F4BE; Guardar hoy</button>
  </div>
  <div class="brow" style="margin-top:0">
    <button class="btn btn-i" onclick="document.getElementById('fi').click()">&#x1F4C2; Importar CSV</button>
    <button class="btn btn-c" onclick="exportCSV()">&#x2B07; Exportar CSV</button>
  </div>
  <input type="file" id="fi" accept=".csv" onchange="importCSV(event)">
  <div class="status-bar">
    <div class="dot" id="sdot"></div>
    <span id="stxt">Conectando con Google Sheets...</span>
  </div>
  <div class="smsg" id="smsg"></div>
</div>

<div class="chart-card">
  <div class="ch">
    <span class="ct">Evoluci&#xF3;n del Portfolio</span>
    <span class="cs" id="cr">&#x2014;</span>
  </div>
  <div class="leg">
    <div class="li"><div class="ld" style="background:#60a5fa"></div>Balanz</div>
    <div class="li"><div class="ld" style="background:#c9a84c"></div>Caja</div>
    <div class="li"><div class="ld" style="background:#4ade80"></div>FCI Galicia</div>
  </div>
  <div class="cw"><canvas id="myChart"></canvas></div>
</div>

<div class="tcrd">
  <div class="th"><span class="tt">Hist&#xF3;rico d&#xED;a a d&#xED;a</span></div>
  <div class="tw">
    <table>
      <thead><tr><th>Fecha</th><th>Caja</th><th>Balanz</th><th>FCI</th><th>Total</th><th></th></tr></thead>
      <tbody id="tb"></tbody>
    </table>
    <div class="es" id="es">Cargando...</div>
  </div>
</div>

</div>

// ── UTILS ──
function fmt(n) {
  return '$ ' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function todayISO() {
  var d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function ddisp(iso) {
  // Handle Date objects or strings like "2026-02-24T03:00:00.000Z"
  var s = String(iso).substring(0, 10);
  var p = s.split('-');
  if (p.length !== 3) return String(iso);
  return p[2]+'/'+p[1]+'/'+p[0];
}
function toISO(val) {
  // Normalize any date value to YYYY-MM-DD string
  var s = String(val).substring(0, 10);
  return s;
}

// ── API CALLS ──
function apiGet() {
  return fetch(API + '?action=get')
    .then(function(r) { return r.json(); });
}

function apiPost(body) {
  return fetch(API, {
    method: 'POST',
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

// ── LOAD FROM SHEET ──
function loadFromSheet() {
  setStatus('loading', 'Cargando datos...');
  setBtns(true);
  apiGet().then(function(res) {
    if (res.records && res.records.length > 0) {
      cache = res.records.map(function(r) {
        return {date:toISO(r.date), caja:r.caja, balanz:r.balanz, fci:r.fci||0, total:r.total};
      });
      seeded = true;
      setStatus('ok', 'Conectado \u2022 ' + cache.length + ' registros');
      renderAll();
      setBtns(false);
    } else {
      // Sheet empty — seed it with historical data
      setStatus('loading', 'Cargando datos hist\u00f3ricos en Sheets...');
      apiPost({action: 'seed', records: SEED}).then(function(r2) {
        cache = SEED.slice();
        seeded = true;
        setStatus('ok', 'Datos hist\u00f3ricos cargados \u2022 ' + cache.length + ' registros');
        renderAll();
        setBtns(false);
      }).catch(function(e) {
        cache = SEED.slice();
        seeded = true;
        setStatus('err', 'Sheets no disponible \u2014 modo offline');
        renderAll();
        setBtns(false);
      });
    }
  }).catch(function(err) {
    // Offline fallback: use seed
    cache = SEED.slice();
    seeded = true;
    setStatus('err', 'Sin conexi\u00f3n \u2014 modo offline');
    renderAll();
    setBtns(false);
  });
}

function setBtns(disabled) {
  ['saveBtn'].forEach(function(id) {
    document.getElementById(id).disabled = disabled;
  });
}

// ── SAVE RECORD ──
function saveRecord() {
  var c = parseFloat(document.getElementById('caja').value) || 0;
  var b = parseFloat(document.getElementById('balanz').value) || 0;
  var f = parseFloat(document.getElementById('fci').value) || 0;
  var t = c + b + f;
  var td = todayISO();
  var rec = {date:td, caja:c, balanz:b, fci:f, total:t};

  // Update local cache immediately
  var idx = cache.findIndex(function(r){return r.date===td;});
  if (idx >= 0) cache[idx] = rec; else cache.push(rec);
  cache.sort(function(a,b){return a.date < b.date ? -1 : 1;});
  renderAll();

  var btn = document.getElementById('saveBtn');
  var msg = document.getElementById('smsg');
  btn.textContent = '\u2713 Guardado'; btn.classList.add('ok');
  msg.textContent = '';
  setStatus('loading', 'Guardando en Sheets...');

  apiPost({action:'upsert', record:rec}).then(function(res) {
    if (res.ok) {
      setStatus('ok', 'Guardado en Sheets \u2022 ' + cache.length + ' registros');
      msg.textContent = 'Registro del ' + ddisp(td) + ' guardado.';
    } else {
      setStatus('err', 'Error al guardar en Sheets');
      msg.className = 'smsg err';
      msg.textContent = 'Error: ' + (res.error || 'desconocido');
    }
  }).catch(function() {
    setStatus('err', 'Sin conexi\u00f3n \u2014 guardado solo localmente');
    msg.textContent = 'Guardado localmente (sin conexi\u00f3n).';
  });

  setTimeout(function(){
    btn.innerHTML='&#x1F4BE; Guardar hoy'; btn.classList.remove('ok');
    setTimeout(function(){ msg.textContent=''; msg.className='smsg'; }, 3000);
  }, 2000);
}

// ── DELETE ──
function delRec(date) {
  if (!confirm('Eliminar el registro del ' + ddisp(date) + '?')) return;
  cache = cache.filter(function(r){return r.date!==date;});
  renderAll();
  setStatus('loading', 'Eliminando...');
  apiPost({action:'delete', date:date}).then(function(res) {
    setStatus('ok', res.ok ? 'Eliminado' : 'Error al eliminar');
  }).catch(function(){ setStatus('err', 'Sin conexi\u00f3n'); });
}

// ── EXPORT CSV ──
function exportCSV() {
  if (!cache.length) { alert('No hay datos.'); return; }
  var rows = 'fecha,caja_seguridad,balanz,fci_galicia,total\n';
  cache.forEach(function(r){
    rows += r.date+','+r.caja+','+r.balanz+','+(r.fci||0)+','+r.total+'\n';
  });
  var blob = new Blob([rows], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'finanzas_'+todayISO()+'.csv';
  a.click();
}

// ── IMPORT CSV ──
function importCSV(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var lines = e.target.result.trim().split(/\r?\n/);
    if (lines.length < 2) { alert('CSV vacío.'); return; }
    var sep = lines[0].indexOf(';') >= 0 ? ';' : ',';
    var hdr = lines[0].toLowerCase().split(sep).map(function(h){return h.trim();});
    var ci = {
      date:   hdr.findIndex(function(h){return h.indexOf('fecha')>=0||h==='date';}),
      caja:   hdr.findIndex(function(h){return h.indexOf('caja')>=0;}),
      balanz: hdr.findIndex(function(h){return h.indexOf('balanz')>=0;}),
      fci:    hdr.findIndex(function(h){return h.indexOf('fci')>=0||h.indexOf('galicia')>=0;})
    };
    if (ci.date<0||ci.caja<0||ci.balanz<0) { alert('Columnas no reconocidas.'); return; }
    var imported = 0;
    for (var i = 1; i < lines.length; i++) {
      var line = lines[i].trim(); if (!line) continue;
      var cols = line.split(sep).map(function(c){return c.trim();});
      var ds = cols[ci.date]; if (!ds) continue;
      var m = ds.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
      if (m) ds = m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
      if (!/^\d{4}-\d{2}-\d{2}$/.test(ds)) continue;
      var caja=parseFloat(cols[ci.caja])||0, balanz=parseFloat(cols[ci.balanz])||0;
      var fci=ci.fci>=0?(parseFloat(cols[ci.fci])||0):0;
      var rec={date:ds,caja:caja,balanz:balanz,fci:fci,total:caja+balanz+fci};
      var pos=cache.findIndex(function(r){return r.date===ds;});
      if(pos>=0) cache[pos]=rec; else cache.push(rec);
      imported++;
    }
    cache.sort(function(a,b){return a.date<b.date?-1:1;});
    renderAll();
    setStatus('loading','Subiendo '+imported+' registros a Sheets...');
    apiPost({action:'seed',records:cache}).then(function(res){
      setStatus('ok','Importados '+imported+' registros en Sheets');
    }).catch(function(){
      setStatus('err','Importado localmente, sin conexi\u00f3n con Sheets');
    });
    var msg=document.getElementById('smsg');
    msg.textContent='\u2713 '+imported+' registros importados.';
    setTimeout(function(){msg.textContent='';},4000);
  };
  reader.readAsText(file);
  event.target.value='';
}

// ── CHART ──
var chartInst = null;
function renderChart(h) {
  var labels = h.map(function(r){return ddisp(r.date);});
  var dB=h.map(function(r){return r.balanz||0;});
  var dC=h.map(function(r){return r.caja||0;});
  var dF=h.map(function(r){return r.fci||0;});
  var rng=document.getElementById('cr');
  if(h.length>=2) rng.textContent=labels[0]+' \u2192 '+labels[h.length-1];
  else if(h.length===1) rng.textContent=labels[0];
  else rng.textContent='\u2014';
  var ctx=document.getElementById('myChart').getContext('2d');
  var gB=ctx.createLinearGradient(0,0,0,220);
  gB.addColorStop(0,'rgba(96,165,250,0.75)');gB.addColorStop(1,'rgba(96,165,250,0.25)');
  var gC=ctx.createLinearGradient(0,0,0,220);
  gC.addColorStop(0,'rgba(201,168,76,0.80)');gC.addColorStop(1,'rgba(201,168,76,0.30)');
  var gF=ctx.createLinearGradient(0,0,0,220);
  gF.addColorStop(0,'rgba(74,222,128,0.80)');gF.addColorStop(1,'rgba(74,222,128,0.30)');
  var pr=h.length<=30?3:(h.length<=120?1:0);
  if(chartInst) chartInst.destroy();
  chartInst=new Chart(ctx,{
    type:'line',
    data:{labels:labels,datasets:[
      {label:'Balanz',data:dB,fill:'origin',backgroundColor:gB,borderColor:'#60a5fa',
       borderWidth:1.5,pointRadius:pr,pointHoverRadius:6,pointBackgroundColor:'#60a5fa',
       pointBorderColor:'#0d0f14',pointBorderWidth:1,tension:0.38,order:3},
      {label:'Caja de Seguridad',data:dC,fill:'-1',backgroundColor:gC,borderColor:'#c9a84c',
       borderWidth:1.5,pointRadius:pr,pointHoverRadius:6,pointBackgroundColor:'#c9a84c',
       pointBorderColor:'#0d0f14',pointBorderWidth:1,tension:0.38,order:2},
      {label:'FCI Galicia',data:dF,fill:'-1',backgroundColor:gF,borderColor:'#4ade80',
       borderWidth:1.5,pointRadius:pr,pointHoverRadius:6,pointBackgroundColor:'#4ade80',
       pointBorderColor:'#0d0f14',pointBorderWidth:1,tension:0.38,order:1}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1a2035',borderColor:'#2e3547',borderWidth:1,
          titleColor:'#9ca3af',bodyColor:'#e8eaf0',
          titleFont:{family:'DM Mono',size:11},bodyFont:{family:'DM Mono',size:12},
          padding:12,
          callbacks:{
            label:function(c){return '  '+c.dataset.label+': '+fmt(c.parsed.y);},
            footer:function(items){
              var t=items.reduce(function(s,i){return s+i.parsed.y;},0);
              return '  Total: '+fmt(t);
            }
          },
          footerColor:'#c9a84c',footerFont:{family:'DM Mono',size:12,weight:'500'}
        }
      },
      scales:{
        x:{stacked:true,grid:{color:'rgba(255,255,255,0.04)',drawTicks:false},
           ticks:{color:'#6b7280',font:{family:'DM Mono',size:10},maxTicksLimit:7,maxRotation:40},
           border:{color:'rgba(255,255,255,0.07)'}},
        y:{stacked:true,grid:{color:'rgba(255,255,255,0.04)',drawTicks:false},
           ticks:{color:'#6b7280',font:{family:'DM Mono',size:10},
             callback:function(v){
               if(v>=1000000)return '$'+(v/1000000).toFixed(1)+'M';
               if(v>=1000)return '$'+(v/1000).toFixed(0)+'k';
               return '$'+v;
             }},
           border:{color:'rgba(255,255,255,0.07)'}}
      }
    }
  });
}

// ── TABLE ──
function renderTable(h) {
  var tb=document.getElementById('tb');
  var es=document.getElementById('es');
  tb.innerHTML='';
  if(!h.length){es.style.display='block';return;}
  es.style.display='none';
  h.slice().reverse().forEach(function(r){
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td class="dt">'+ddisp(r.date)+'</td>'+
      '<td>'+fmt(r.caja)+'</td>'+
      '<td>'+fmt(r.balanz)+'</td>'+
      '<td>'+fmt(r.fci||0)+'</td>'+
      '<td class="dtt">'+fmt(r.total)+'</td>'+
      '<td><button class="xb" onclick="delRec(\''+r.date+'\')">&#x2715;</button></td>';
    tb.appendChild(tr);
  });
}

function renderAll(){renderChart(cache);renderTable(cache);}

// ── INIT ──
loadFromSheet();
</script>
